<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlopLess Search</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1f1f1f;
            --accent: #007bff;
            --text: #e0e0e0;
            --muted: #888;
            --border: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 900px;
            padding: 2rem 1rem 1rem;
        }

        h1 {
            font-size: 1.2rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .search-bar {
            display: flex;
            gap: 8px;
        }

        #q {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: var(--panel);
            color: white;
            font-size: 16px;
            outline: none;
        }

        #q:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.2);
        }

        button[type="submit"] {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            background: var(--panel);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.15s;
        }

        button[type="submit"]:hover {
            background: #2e2e2e;
        }

        #status {
            color: var(--muted);
            font-size: 0.85rem;
            padding: 0.5rem 0;
            min-height: 1.5rem;
            text-align: center;
        }

        #status a {
            color: var(--muted);
        }

        #results {
            width: 100%;
            padding: 0 1rem 3rem;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
            gap: 1.5rem;
            align-items: start;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .column-big {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1rem;
            align-items: start;
        }

        .column-big .column-label {
            grid-column: 1 / -1;
        }

        .column-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            padding-bottom: 0.25rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.25rem;
        }

        .result {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.2rem;
            transition: border-color 0.15s;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .result:hover {
            border-color: #555;
        }

        .result-source {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .source-wiby         { color: oklch(70% 0.25 315); }
        .source-brave        { color: oklch(70% 0.25 135); }
        .source-marginalia   { color: oklch(70% 0.25 225); }
        .source-mwmbl        { color: oklch(70% 0.25 270); }
        .source-searchmysite { color: oklch(70% 0.25 180); }
        .source-reddit       { color: oklch(70% 0.25 45); }
        .source-britannica   { color: oklch(70% 0.25 0); }

        .result-title a {
            font-size: 1rem;
            font-weight: 600;
            color: #c8d8ff;
            text-decoration: none;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-title a::after {
            content: '';
            position: absolute;
            inset: 0;
        }

        .result-title a:hover {
            text-decoration: underline;
        }

        .result-url {
            font-size: 0.78rem;
            color: var(--muted);
            margin: 0.2rem 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-img {
            float: right;
            width: 140px;
            height: 78px;
            object-fit: cover;
            border-radius: 4px;
            margin-left: 0.6rem;
        }

        .result-desc {
            font-size: 0.88rem;
            color: #bbb;
            line-height: 1.5;
            margin-top: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 900px) {
            #results { grid-template-columns: 1fr; }
            .column-big { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>SlopLess Search</h1>
    <form class="search-bar" method="get" action="/">
        <input type="text" id="q" name="q" placeholder="Search..." autofocus autocomplete="off" value="{{QUERY}}">
        <button type="submit">Search</button>
    </form>
    <div id="status">{{STATUS}}</div>
</header>

{{RESULTS}}

</body>
</html>
